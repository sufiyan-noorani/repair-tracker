<!DOCTYPE html>
<html>
    <head>
        <title>Orders</title>
    </head>
    <body>
        <form action="" method="post">
            {% csrf_token %}
            <h1>Add Order</h1>
            Customer Name:
            <input type="text" name="customer_name" id="customer_name"><br><br>
            Device Name:
            <input type="text" name="device_name" id="device_name"><br><br>
            Quantity:
            <input type="number" name="quantity" id="quantity"><br><br>
            <input type="submit" value="Add">
        </form>

        <h1>Orders</h1>
        {% if orders %}
        <ul>
            {% for order in orders %}
            <li>
                {{order.customer_name}} ordered {{order.quantity}} repair order for {{order.device_name}}
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No orders found</p>
        {% endif %}
    </body>
</html>
