<!DOCTYPE html>
<html>
    <head>
        <title>Orders</title>
    </head>
    <body>
        <h1>Orders</h1>
        {% if orders %}
        <ul>
            {% for order in orders %}
            <li>
                {{order.customer_name}} ordered {{order.quantity}} repair order for {{order.device_name}}
            </li>
            {% endfor %}
        </ul>
        {% else %}
        <p>No orders found</p>
        {% endif %}
    </body>
</html>
